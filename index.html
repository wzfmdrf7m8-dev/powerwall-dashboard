<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Powerwall Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<style>
  :root{--bg:#0a0e14;--card:rgba(22,27,35,.75);--edge:rgba(255,255,255,.07);--txt:#e8ecf2;--dim:#8b95a5;
    --green:#3ecf8e;--amber:#ffb627;--blue:#4ea1f7;--red:#ff5c5c;--purple:#a78bfa}
  *{box-sizing:border-box;margin:0}
  body{color:var(--txt);font:15px/1.5 -apple-system,'Segoe UI',Roboto,sans-serif;padding:24px;max-width:1150px;margin:auto;
    background:var(--bg);background-image:radial-gradient(1200px 600px at 80% -10%,rgba(62,207,142,.10),transparent),
    radial-gradient(900px 500px at 0% 110%,rgba(78,161,247,.10),transparent);min-height:100vh}
  h1{font-size:22px;letter-spacing:-.02em}
  .sub{color:var(--dim);font-size:13px}
  header{display:flex;align-items:center;gap:16px;margin-bottom:22px;flex-wrap:wrap}
  header .spacer{flex:1}
  .card{background:var(--card);backdrop-filter:blur(8px);border:1px solid var(--edge);border-radius:16px;padding:16px;
    box-shadow:0 8px 30px rgba(0,0,0,.35)}
  .layout{display:grid;grid-template-columns:1.2fr 1fr;gap:16px;margin-bottom:16px}
  @media(max-width:900px){.layout{grid-template-columns:1fr}}
  .statgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:16px}
  .stat .lbl{color:var(--dim);font-size:11px;text-transform:uppercase;letter-spacing:.08em}
  .stat .val{font-size:24px;font-weight:650;margin-top:2px;font-variant-numeric:tabular-nums}
  .stat .flow{font-size:12px;color:var(--dim)}
  .stat{position:relative;overflow:hidden}
  .stat::after{content:'';position:absolute;inset:0;border-radius:16px;pointer-events:none;
    background:linear-gradient(120deg,transparent 30%,rgba(255,255,255,.045) 45%,transparent 60%);
    transform:translateX(-100%);animation:sheen 6s infinite}
  @keyframes sheen{20%{transform:translateX(100%)}100%{transform:translateX(100%)}}
  .chartbox h2,.card h2{font-size:13px;color:var(--dim);margin-bottom:10px;text-transform:uppercase;letter-spacing:.08em}
  .chartbox{margin-bottom:16px}
  /* SOC ring */
  .ring{width:74px;height:74px}
  .ring text{fill:var(--txt);font-weight:700}
  /* flow svg */
  #flow{width:100%;height:auto;display:block}
  .node-label{fill:var(--txt);font-size:14px;font-weight:650;text-anchor:middle}
  .node-val{fill:var(--dim);font-size:12.5px;text-anchor:middle;font-variant-numeric:tabular-nums}
  .wire{fill:none;stroke:rgba(255,255,255,.08);stroke-width:2}
  .wire.active{stroke-width:2.5}
  #overlay{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:10}
  #overlay .box{background:var(--card);border:1px solid var(--edge);padding:34px;border-radius:18px;width:330px;text-align:center}
  input,select,button{font:inherit;border-radius:10px;border:1px solid #2a3240;background:#0e1116;color:var(--txt);padding:8px 12px}
  button{background:var(--green);color:#07100b;border:0;font-weight:650;cursor:pointer}
  button:hover{filter:brightness(1.1)}
  button.sec{background:#2a3240;color:var(--txt)}
  .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin:8px 0}
  .err{color:var(--red);font-size:13px;margin-top:8px;min-height:18px}
  .ok{color:var(--green)}
  .pill{display:inline-block;background:#232b36;border:1px solid var(--edge);border-radius:99px;padding:3px 12px;font-size:12px;margin:2px}
  details summary{cursor:pointer;color:var(--dim)}
  .today{display:flex;gap:18px;flex-wrap:wrap;margin-top:10px}
  .today div{font-size:13px;color:var(--dim)}
  .today b{color:var(--txt);font-size:16px;display:block;font-variant-numeric:tabular-nums}
</style>
</head>
<body>
<div id="overlay"><div class="box">
  <h1 style="margin-bottom:14px">&#9889; Powerwall</h1>
  <input id="pw" type="password" placeholder="Dashboard password" style="width:100%" autofocus>
  <div class="row" style="justify-content:center"><button onclick="unlock()">Unlock</button></div>
  <div class="err" id="pwerr"></div>
</div></div>

<header>
  <svg class="ring" viewBox="0 0 74 74">
    <circle cx="37" cy="37" r="31" fill="none" stroke="#232b36" stroke-width="7"/>
    <circle id="socArc" cx="37" cy="37" r="31" fill="none" stroke="url(#socGrad)" stroke-width="7"
      stroke-linecap="round" stroke-dasharray="194.8" stroke-dashoffset="194.8" transform="rotate(-90 37 37)"
      style="transition:stroke-dashoffset 1.2s ease"/>
    <defs><linearGradient id="socGrad"><stop offset="0%" stop-color="#3ecf8e"/><stop offset="100%" stop-color="#4ea1f7"/></linearGradient></defs>
    <text id="socTxt" x="37" y="42" text-anchor="middle" font-size="16">–</text>
  </svg>
  <div><h1 id="title">Powerwall</h1><div class="sub" id="updated">locked</div></div>
  <div class="spacer"></div>
  <div class="sub" id="modeline"></div>
</header>

<div class="layout">
  <div class="card">
    <h2>Live energy flow</h2>
    <svg id="flow" viewBox="0 0 620 430">
      <!-- wires -->
      <path id="p_sh" class="wire" d="M 340 92 Q 480 130 520 268"/>
      <path id="p_sb" class="wire" d="M 310 106 L 310 300"/>
      <path id="p_sg" class="wire" d="M 280 92 Q 140 130 100 268"/>
      <path id="p_gh" class="wire" d="M 128 300 Q 310 220 492 300"/>
      <path id="p_gb" class="wire" d="M 122 320 Q 200 356 272 330"/>
      <path id="p_bh" class="wire" d="M 348 330 Q 420 356 498 320"/>
      <g id="dots"></g>
      <!-- solar -->
      <g transform="translate(310,60)">
        <circle r="34" fill="rgba(255,182,39,.12)" stroke="#ffb627" stroke-width="2"/>
        <text y="7" text-anchor="middle" font-size="26">&#9728;&#65039;</text>
        <text class="node-label" y="-44">Solar</text>
        <text id="v_solar" class="node-val" y="58">–</text>
      </g>
      <!-- grid -->
      <g transform="translate(96,300)">
        <circle r="34" fill="rgba(255,92,92,.10)" stroke="#ff5c5c" stroke-width="2"/>
        <text y="8" text-anchor="middle" font-size="24">&#128509;</text>
        <text class="node-label" y="-44">Grid</text>
        <text id="v_grid" class="node-val" y="58">–</text>
      </g>
      <!-- home -->
      <g transform="translate(524,300)">
        <circle r="34" fill="rgba(78,161,247,.12)" stroke="#4ea1f7" stroke-width="2"/>
        <text y="8" text-anchor="middle" font-size="24">&#127968;</text>
        <text class="node-label" y="-44">Home</text>
        <text id="v_load" class="node-val" y="58">–</text>
      </g>
      <!-- battery -->
      <g transform="translate(310,340)">
        <rect x="-30" y="-26" width="60" height="52" rx="10" fill="rgba(62,207,142,.10)" stroke="#3ecf8e" stroke-width="2"/>
        <rect id="battFill" x="-26" y="22" width="52" height="0" rx="6" fill="rgba(62,207,142,.45)"/>
        <text id="battPct" y="6" text-anchor="middle" font-size="14" font-weight="700" fill="#e8ecf2">–</text>
        <text class="node-label" y="-38">Powerwall</text>
        <text id="v_batt" class="node-val" y="46">–</text>
      </g>
    </svg>
  </div>
  <div>
    <div class="statgrid">
      <div class="card stat"><div class="lbl">Solar</div><div class="val" style="color:var(--amber)" id="solar">–</div></div>
      <div class="card stat"><div class="lbl">Home</div><div class="val" style="color:var(--blue)" id="load">–</div></div>
      <div class="card stat"><div class="lbl">Grid</div><div class="val" id="grid">–</div><div class="flow" id="gridflow"></div></div>
      <div class="card stat"><div class="lbl">Battery</div><div class="val" style="color:var(--green)" id="batt">–</div><div class="flow" id="battflow"></div></div>
    </div>
    <div class="card">
      <h2>Today</h2>
      <div class="today">
        <div>Solar generated<b id="t_solar">–</b></div>
        <div>Home used<b id="t_home">–</b></div>
        <div>Grid imported<b id="t_imp">–</b></div>
        <div>Grid exported<b id="t_exp">–</b></div>
      </div>
    </div>
    <div class="card" style="margin-top:12px">
      <h2>Automations</h2>
      <div id="autos"></div>
      <div id="lastlog" class="sub" style="margin-top:6px"></div>
    </div>
  </div>
</div>

<div class="card chartbox"><h2>Battery &amp; power — last 7 days</h2><canvas id="histChart" height="88"></canvas></div>
<div class="card chartbox"><h2>Daily energy — last 30 days (kWh)</h2><canvas id="dayChart" height="88"></canvas></div>

<details class="card">
  <summary>Controls (requires GitHub token)</summary>
  <div class="row"><input id="pat" type="password" placeholder="Fine-grained GitHub token (stored in this browser only)" style="flex:1"><button class="sec" onclick="savePat()">Save</button></div>
  <div class="row">
    <input id="rsv" type="number" min="0" max="100" placeholder="%" style="width:80px"><button onclick="cmd('reserve',val('rsv'))">Set reserve</button>
    <select id="mode"><option value="self_consumption">self_consumption</option><option value="autonomous">autonomous (time-based)</option></select>
    <button onclick="cmd('mode',val('mode'))">Set mode</button>
  </div>
  <div class="row">
    <button onclick="cmd('storm','on')">Storm on</button><button class="sec" onclick="cmd('storm','off')">Storm off</button>
    <button onclick="cmd('grid_charging','on')">Allow grid charging</button><button class="sec" onclick="cmd('grid_charging','off')">Block grid charging</button>
    <button class="sec" onclick="cmd('poll','')">Refresh now</button>
  </div>
  <div class="err" id="cmderr"></div>
</details>

<script>
const REPO='wzfmdrf7m8-dev/powerwall-dashboard', WF='poll.yml', SVGNS='http://www.w3.org/2000/svg';
let PASS=null,histChart,dayChart;

async function deriveKey(pass,salt){
  const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pass),'PBKDF2',false,['deriveKey']);
  return crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:200000,hash:'SHA-256'},km,{name:'AES-CBC',length:256},false,['decrypt']);
}
async function loadData(pass){
  const res=await fetch('data/dashboard.enc?_='+Date.now(),{cache:'no-store'});
  if(!res.ok) throw new Error('no data yet — run the poll workflow');
  const raw=Uint8Array.from(atob((await res.text()).trim()),c=>c.charCodeAt(0));
  const key=await deriveKey(pass,raw.slice(0,16));
  const pt=await crypto.subtle.decrypt({name:'AES-CBC',iv:raw.slice(16,32)},key,raw.slice(32));
  return JSON.parse(new TextDecoder().decode(pt));
}
const el=id=>document.getElementById(id), val=id=>el(id).value;
const kw=w=>w==null?'–':(Math.abs(w)>=950?(w/1000).toFixed(1)+' kW':Math.round(w)+' W');
const kwh=x=>x==null?'–':(x/1000).toFixed(1)+' kWh';

/* ---- animated flow dots ---- */
function setDots(pathId,watts,color,reverse){
  const w=Math.abs(watts||0), path=el(pathId);
  path.classList.toggle('active',w>50);
  if(w<=50) return;
  const n=Math.min(4,1+Math.floor(w/1500));            // dot count by power
  const dur=Math.max(1.2,4.5-3*Math.min(1,w/8000));    // faster when stronger
  for(let i=0;i<n;i++){
    const c=document.createElementNS(SVGNS,'circle');
    c.setAttribute('r',w>3000?5:4); c.setAttribute('fill',color);
    c.setAttribute('opacity','.95'); c.style.filter=`drop-shadow(0 0 6px ${color})`;
    const m=document.createElementNS(SVGNS,'animateMotion');
    m.setAttribute('dur',dur+'s'); m.setAttribute('repeatCount','indefinite');
    m.setAttribute('begin',(-i*dur/n)+'s');
    if(reverse){m.setAttribute('keyPoints','1;0');m.setAttribute('keyTimes','0;1');m.setAttribute('calcMode','linear');}
    const mp=document.createElementNS(SVGNS,'mpath');
    mp.setAttributeNS('http://www.w3.org/1999/xlink','href','#'+pathId);
    m.appendChild(mp); c.appendChild(m); el('dots').appendChild(c);
  }
}
function renderFlow(L){
  el('dots').innerHTML='';
  const solar=L.solar_power||0, load=L.load_power||0, grid=L.grid_power||0, batt=L.battery_power||0;
  const gridImp=Math.max(grid,0), gridExp=Math.max(-grid,0);
  const battDis=Math.max(batt,0), battChg=Math.max(-batt,0);
  // decompose (approximate, good enough for viz)
  const solarToBatt=Math.min(solar,battChg);
  const solarToHome=Math.min(solar-solarToBatt,load);
  const solarToGrid=Math.min(Math.max(solar-solarToBatt-solarToHome,0),gridExp);
  const battToHome=Math.min(battDis,Math.max(load-solarToHome,0));
  const battToGrid=Math.max(battDis-battToHome,0);
  const gridToBatt=Math.max(battChg-solarToBatt,0);
  const gridToHome=Math.max(gridImp-gridToBatt,0);
  setDots('p_sh',solarToHome,'#ffb627');
  setDots('p_sb',solarToBatt,'#ffb627');
  setDots('p_sg',solarToGrid,'#3ecf8e');
  setDots('p_gh',gridToHome,'#ff5c5c');
  setDots('p_gb',gridToBatt,'#ff5c5c');
  setDots('p_bh',battToHome,'#3ecf8e');
  if(battToGrid>50) setDots('p_gb',battToGrid,'#3ecf8e',true);
  el('v_solar').textContent=kw(solar);
  el('v_grid').textContent=(grid<-50?'← ':grid>50?'→ ':'')+kw(Math.abs(grid));
  el('v_load').textContent=kw(load);
  el('v_batt').textContent=(batt<-50?'charging ':batt>50?'discharging ':'')+kw(Math.abs(batt));
  const soc=L.percentage_charged||0;
  el('battPct').textContent=soc.toFixed(0)+'%';
  const h=Math.max(2,44*soc/100);
  el('battFill').setAttribute('y',22-h); el('battFill').setAttribute('height',h);
  el('socArc').style.strokeDashoffset=194.8*(1-soc/100);
  el('socTxt').textContent=soc.toFixed(0)+'%';
}

function render(d){
  el('title').textContent=d.site_name||'Powerwall';
  el('updated').textContent='Updated '+new Date(d.generated_at).toLocaleString();
  const L=d.live||{};
  renderFlow(L);
  el('solar').textContent=kw(L.solar_power);
  el('load').textContent=kw(L.load_power);
  el('grid').textContent=kw(Math.abs(L.grid_power));
  el('gridflow').textContent=L.grid_power>50?'importing':(L.grid_power<-50?'exporting':'idle');
  el('batt').textContent=kw(Math.abs(L.battery_power));
  el('battflow').textContent=L.battery_power>50?'discharging':(L.battery_power<-50?'charging':'idle');
  const si=d.site_info||{};
  el('modeline').textContent=`reserve ${si.backup_reserve_percent??'–'}% · ${si.default_real_mode||'–'} · storm watch ${((si.user_settings||{}).storm_mode_enabled?'on':'off')}`;
  const a=d.automations||{};
  let html='<span class="pill">'+(a.enabled?'automation on':'automation off — monitoring only')+'</span>';
  if(a.enabled&&a.cheap_window&&a.cheap_window.enabled) html+='<span class="pill">cheap window '+a.cheap_window.start+'–'+a.cheap_window.end+'</span>';
  el('autos').innerHTML=html;
  el('lastlog').textContent=(d.log&&d.log.length)?('Last run: '+d.log.join('; ')):'Last run: no changes made';

  const e=(d.energy_daily||[]).filter(r=>r.timestamp);
  const t=e[e.length-1]||{};
  const home=r=>((r.consumer_energy_imported_from_grid||0)+(r.consumer_energy_imported_from_solar||0)+(r.consumer_energy_imported_from_battery||0));
  el('t_solar').textContent=kwh(t.solar_energy_exported);
  el('t_home').textContent=kwh(home(t));
  el('t_imp').textContent=kwh(t.grid_energy_imported);
  el('t_exp').textContent=kwh((t.grid_energy_exported_from_solar||0)+(t.grid_energy_exported_from_battery||0));

  const h=d.history||[];
  const labels=h.map(p=>p.t.slice(5,16).replace('T',' '));
  histChart&&histChart.destroy();
  histChart=new Chart(el('histChart'),{type:'line',data:{labels,datasets:[
    {label:'Battery %',data:h.map(p=>p.soc),borderColor:'#3ecf8e',backgroundColor:'rgba(62,207,142,.12)',fill:true,pointRadius:0,yAxisID:'y1',tension:.35},
    {label:'Solar kW',data:h.map(p=>p.solar/1000),borderColor:'#ffb627',pointRadius:0,tension:.35},
    {label:'Home kW',data:h.map(p=>p.load/1000),borderColor:'#4ea1f7',pointRadius:0,tension:.35},
    {label:'Grid kW',data:h.map(p=>p.grid/1000),borderColor:'#ff5c5c',pointRadius:0,tension:.35}]},
    options:{scales:{y:{title:{display:true,text:'kW'},grid:{color:'rgba(255,255,255,.05)'}},
      y1:{position:'right',min:0,max:100,grid:{drawOnChartArea:false}},x:{ticks:{maxTicksLimit:10},grid:{display:false}}},
      plugins:{legend:{labels:{color:'#8b95a5'}}}}});
  dayChart&&dayChart.destroy();
  dayChart=new Chart(el('dayChart'),{type:'bar',data:{labels:e.map(r=>r.timestamp.slice(5,10)),datasets:[
    {label:'Solar',data:e.map(r=>(r.solar_energy_exported||0)/1000),backgroundColor:'#ffb627',borderRadius:4},
    {label:'Home',data:e.map(r=>home(r)/1000),backgroundColor:'#4ea1f7',borderRadius:4},
    {label:'Grid import',data:e.map(r=>(r.grid_energy_imported||0)/1000),backgroundColor:'#ff5c5c',borderRadius:4}]},
    options:{scales:{x:{grid:{display:false}},y:{grid:{color:'rgba(255,255,255,.05)'}}},plugins:{legend:{labels:{color:'#8b95a5'}}}}});
}

async function unlock(){
  try{
    const p=val('pw');
    render(await loadData(p));
    PASS=p; el('overlay').style.display='none';
    setInterval(async()=>{try{render(await loadData(PASS))}catch(e){}},5*60*1000);
  }catch(e){el('pwerr').textContent=e.name==='OperationError'?'Wrong password':e.message}
}
el('pw').addEventListener('keydown',e=>{if(e.key==='Enter')unlock()});
if(localStorage.getItem('pw_pat')) window.addEventListener('load',()=>{el('pat').value=localStorage.getItem('pw_pat')});
function savePat(){localStorage.setItem('pw_pat',val('pat'));el('cmderr').innerHTML='<span class="ok">Token saved in this browser.</span>'}
async function cmd(command,value){
  const pat=localStorage.getItem('pw_pat')||val('pat');
  if(!pat){el('cmderr').textContent='Add a GitHub token first (repo Actions write access).';return}
  el('cmderr').textContent='Sending…';
  const r=await fetch(`https://api.github.com/repos/${REPO}/actions/workflows/${WF}/dispatches`,{
    method:'POST',headers:{'Authorization':'Bearer '+pat,'Accept':'application/vnd.github+json'},
    body:JSON.stringify({ref:'main',inputs:{command,value:String(value)}})});
  el('cmderr').innerHTML=r.status===204?'<span class="ok">Sent — takes ~1 min, then Refresh now to see it.</span>':('Failed: HTTP '+r.status);
}
</script>
</body>
</html>
