<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Oura</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Oura">
<meta name="theme-color" content="#f5f5f7">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<style>
  :root{--bg:#f5f5f7;--card:#fff;--edge:rgba(0,0,0,.05);--txt:#1d1d1f;--dim:#6e6e73;
    --mint:#34c759;--sun:#ff9500;--cyan:#007aff;--pink:#ff3b30;--violet:#af52de}
  *{box-sizing:border-box;margin:0}
  html,body{overflow-x:hidden;max-width:100vw}
  body{color:var(--txt);font:15px/1.5 -apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',Roboto,sans-serif;
    padding:24px 20px;max-width:1150px;margin:auto;background:var(--bg);min-height:100vh;-webkit-font-smoothing:antialiased}
  nav{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
  nav a{text-decoration:none;color:var(--txt);background:#fff;border:1px solid #e5e5ea;border-radius:99px;padding:6px 16px;font-size:13px;font-weight:600}
  nav a.on{background:#1d1d1f;color:#fff;border-color:#1d1d1f}
  h1{font-size:22px;font-weight:700;margin-bottom:2px}
  .sub{color:var(--dim);font-size:13px;margin-bottom:16px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px;margin-bottom:18px}
  .card{background:var(--card);border:1px solid var(--edge);border-radius:18px;padding:16px 18px;box-shadow:0 1px 2px rgba(0,0,0,.03)}
  .card h3{font-size:13px;font-weight:600;color:var(--dim)}
  .card .v{font-size:30px;font-weight:700;letter-spacing:-.02em}
  .card .m{font-size:12px;color:var(--dim)}
  .ok{color:var(--mint)} .warn{color:var(--pink)} .mid{color:var(--sun)}
  .bar{display:flex;height:10px;border-radius:5px;overflow:hidden;margin:10px 0 6px}
  .bar i{display:block;height:10px}
  .legend{font-size:11px;color:var(--dim)}
  .legend b{font-weight:600;color:var(--txt)}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:right;padding:6px 8px;border-bottom:1px solid #f0f0f3}
  th:first-child,td:first-child{text-align:left}
  th{color:var(--dim);font-weight:600;font-size:12px}
  .err{color:var(--pink);font-size:13px;margin:10px 0}
  #overlay{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:10}
  #overlay .box{background:#fff;border:1px solid var(--edge);padding:32px;border-radius:22px;width:320px;text-align:center}
  input,button{font:inherit;border-radius:10px;border:1px solid #d2d2d7;padding:8px 12px}
  button{background:#0071e3;color:#fff;border:0;font-weight:600;cursor:pointer;border-radius:980px;padding:8px 16px}
</style>
</head>
<body>
<nav>
  <a href="./">⚡ Energy</a><a href="heating">🌡 Heating</a><a href="heatpump">♨️ Heat pump</a><a href="network">📶 Network</a><a href="octopus">🐙 Octopus</a><a class="on" href="oura">💍 Oura</a>
</nav>
<h1>Oura</h1>
<div class="sub" id="sub">…</div>
<div class="err" id="err"></div>
<div class="grid" id="cards"></div>

<div class="card" style="margin-bottom:18px" id="nightCard" hidden>
  <h3 style="margin-bottom:2px">LAST NIGHT</h3>
  <div id="nightTitle" style="font-size:20px;font-weight:700"></div>
  <div class="bar" id="stageBar"></div>
  <div class="legend" id="stageLegend"></div>
  <div class="legend" id="nightStats" style="margin-top:8px"></div>
</div>

<div class="card" style="margin-bottom:18px">
  <h3 style="margin-bottom:8px">SCORES — LAST 30 DAYS</h3>
  <canvas id="scoreChart" height="120"></canvas>
</div>
<div class="card" style="margin-bottom:18px">
  <h3 style="margin-bottom:8px">STEPS — LAST 30 DAYS</h3>
  <canvas id="stepChart" height="110"></canvas>
</div>
<div class="card" style="margin-bottom:18px" id="tempCard">
  <h3 style="margin-bottom:2px">SLEEP vs BEDROOM TEMP</h3>
  <div class="m" id="tempVerdict" style="font-size:13px;color:var(--dim);margin-bottom:8px">collecting…</div>
  <canvas id="tempChart" height="130"></canvas>
</div>
<div class="card" style="margin-bottom:18px" id="nightsCard" hidden>
  <h3 style="margin-bottom:8px">RECENT NIGHTS</h3>
  <div style="overflow-x:auto"><table id="nightsTable"></table></div>
</div>

<div id="overlay" style="display:none"><div class="box">
  <h1 style="font-size:18px;margin-bottom:12px">Unlock</h1>
  <input id="pw" type="password" placeholder="Password" style="width:100%;margin-bottom:10px">
  <button onclick="unlock()">Open</button>
  <div class="err" id="pwerr"></div>
</div></div>

<script>
const WORKER='https://powerwall-api.randlefamily.com';
const el=id=>document.getElementById(id);
let PASS=null,CH1=null,CH2=null;
async function deriveKey(pass,salt){
  const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pass),'PBKDF2',false,['deriveKey']);
  return crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:200000,hash:'SHA-256'},km,{name:'AES-CBC',length:256},false,['decrypt']);
}
async function loadHome(pass){
  const res=await fetch(`${WORKER}/home?_=${Date.now()}`,{cache:'no-store'});
  if(!res.ok) throw new Error('no data yet — the worker refreshes every 5 minutes');
  const raw=Uint8Array.from(atob((await res.text()).trim()),c=>c.charCodeAt(0));
  const key=await deriveKey(pass,raw.slice(0,16));
  const pt=await crypto.subtle.decrypt({name:'AES-CBC',iv:raw.slice(16,32)},key,raw.slice(32));
  return JSON.parse(new TextDecoder().decode(pt));
}
const last=a=>(a&&a.length)?a[a.length-1]:null;
const byDay=(a,day)=>(a||[]).find(x=>x.day===day)||null;
const hm=s=>{if(s==null)return'–';const h=Math.floor(s/3600),m=Math.round(s%3600/60);return h+'h '+String(m).padStart(2,'0')+'m'};
const scoreCls=s=>s==null?'':(s>=85?'ok':(s>=70?'mid':'warn'));
function card(h,v,m,cls){return `<div class="card"><h3>${h}</h3><div class="v ${cls||''}">${v}</div><div class="m">${m||''}</div></div>`}
function render(d){
  const o=d.oura||{};
  el('err').textContent=o.error?('oura: '+o.error):'';
  const info=o.info||{},ring=o.ring||{};
  el('sub').textContent=[info.age?('age '+info.age):'',info.weight?(info.weight+' kg'):'',
    ring.hw?('ring: '+[ring.color,ring.hw,'size '+(ring.size??'?')].filter(Boolean).join(' ')):'',
    'updated '+(o.t||d.generated_at||'').slice(11,16)].filter(Boolean).join(' · ');
  const r=last(o.readiness),s=last(o.sleep),a=last(o.activity);
  const res=last(o.resilience),sp=last(o.spo2),st=last(o.stress),cv=last(o.cardio),v2=last(o.vo2);
  const cards=[];
  if(r) cards.push(card('Readiness',r.score??'–',r.day+(r.temp!=null?(' · temp '+(r.temp>0?'+':'')+r.temp.toFixed(1)+'°'):''),scoreCls(r.score)));
  if(s) cards.push(card('Sleep score',s.score??'–',s.day,scoreCls(s.score)));
  if(a) cards.push(card('Activity',a.score??'–',(a.steps!=null?a.steps.toLocaleString()+' steps':''),scoreCls(a.score)));
  if(a&&a.cal!=null) cards.push(card('Active burn',a.cal+' kcal','total '+(a.totalCal??'–')+' kcal'));
  if(res) cards.push(card('Resilience',(res.level||'–').replace(/_/g,' '),res.day));
  if(st) cards.push(card('Stress',(st.summary||'–').replace(/_/g,' '),hm(st.high)+' high · '+hm(st.recov)+' recovery'));
  if(sp&&sp.avg!=null) cards.push(card('SpO₂',sp.avg.toFixed(1)+'%',(sp.bdi!=null?('breathing disturbance '+sp.bdi):''),sp.avg>=95?'ok':'warn'));
  if(cv&&cv.age!=null) cards.push(card('Cardio age',cv.age,info.age?((cv.age<=info.age?'−':'+')+Math.abs(cv.age-info.age)+' vs actual'):'',(info.age&&cv.age<=info.age)?'ok':'mid'));
  if(v2&&v2.vo2!=null) cards.push(card('VO₂ max',v2.vo2.toFixed(1),'ml/kg/min'));
  el('cards').innerHTML=cards.join('')||'<div class="sub">No Oura data yet — add your OURA_TOKEN secret and the worker will pull it within the hour.</div>';
  // last night
  const n=last(o.nights);
  if(n){
    el('nightCard').hidden=false;
    el('nightTitle').textContent=hm(n.dur)+' asleep · '+(n.eff!=null?(n.eff+'% efficiency'):'');
    const tot=(n.deep||0)+(n.rem||0)+(n.light||0)+(n.awake||0)||1;
    const seg=(v,c)=>`<i style="width:${(100*(v||0)/tot).toFixed(1)}%;background:${c}"></i>`;
    el('stageBar').innerHTML=seg(n.deep,'#0a3d91')+seg(n.rem,'#007aff')+seg(n.light,'#8ec2ff')+seg(n.awake,'#e5e5ea');
    el('stageLegend').innerHTML=`<b style="color:#0a3d91">deep</b> ${hm(n.deep)} · <b style="color:#007aff">REM</b> ${hm(n.rem)} · <b style="color:#5a9ae0">light</b> ${hm(n.light)} · awake ${hm(n.awake)}`;
    el('nightStats').innerHTML=`in bed ${hm(n.tib)} · lowest HR <b>${n.lhr??'–'}</b> · avg HR <b>${n.hr!=null?n.hr.toFixed(0):'–'}</b> · HRV <b>${n.hrv??'–'} ms</b> · breath <b>${n.br!=null?n.br.toFixed(1):'–'}/min</b>`+
      (n.start?` · ${n.start.slice(11,16)} → ${(n.end||'').slice(11,16)}`:'');
  }
  // charts
  const days=[...new Set([...(o.sleep||[]),...(o.readiness||[]),...(o.activity||[])].map(x=>x.day))].sort();
  const pick=(arr,key)=>days.map(dd=>{const x=byDay(arr,dd);return x?x[key]:null});
  if(CH1)CH1.destroy();
  CH1=new Chart(el('scoreChart'),{type:'line',data:{labels:days.map(x=>x.slice(5)),datasets:[
    {label:'Sleep',data:pick(o.sleep,'score'),borderColor:'#007aff',backgroundColor:'#007aff',tension:.3,pointRadius:0,borderWidth:2},
    {label:'Readiness',data:pick(o.readiness,'score'),borderColor:'#34c759',backgroundColor:'#34c759',tension:.3,pointRadius:0,borderWidth:2},
    {label:'Activity',data:pick(o.activity,'score'),borderColor:'#ff9500',backgroundColor:'#ff9500',tension:.3,pointRadius:0,borderWidth:2}]},
    options:{animation:false,spanGaps:true,plugins:{legend:{labels:{boxWidth:8,usePointStyle:true}}},
      scales:{y:{min:40,max:100,grid:{color:'rgba(0,0,0,.06)'},ticks:{maxTicksLimit:4}},x:{ticks:{maxTicksLimit:10,color:'#6e6e73'},grid:{display:false}}}}});
  if(CH2)CH2.destroy();
  CH2=new Chart(el('stepChart'),{type:'bar',data:{labels:days.map(x=>x.slice(5)),datasets:[{label:'steps',data:pick(o.activity,'steps'),backgroundColor:'rgba(0,122,255,.8)',borderRadius:3}]},
    options:{animation:false,plugins:{legend:{display:false}},scales:{y:{grid:{color:'rgba(0,0,0,.06)'},ticks:{maxTicksLimit:4}},x:{ticks:{maxTicksLimit:10,color:'#6e6e73'},grid:{display:false}}}}});
  // sleep vs bedroom temperature correlation
  const sl=(d.sleepLog||[]).filter(x=>x.temp!=null&&x.score!=null);
  if(!sl.length){
    el('tempVerdict').textContent='Logging started — your bedroom temperature is sampled overnight (via tado) and paired with each night\u2019s sleep score. First points appear after tonight.';
  }else{
    // 0.5-degree buckets, need >=3 nights to call a winner
    const buckets={};
    for(const x of sl){const k=(Math.round(x.temp*2)/2).toFixed(1);(buckets[k]=buckets[k]||[]).push(x.score)}
    let best=null;
    for(const k in buckets){if(buckets[k].length>=3){const avg=buckets[k].reduce((a,b)=>a+b,0)/buckets[k].length;
      if(!best||avg>best.avg)best={t:k,avg,n:buckets[k].length}}}
    el('tempVerdict').textContent=sl.length+' nights logged ('+(sl[0].room||'bedroom')+')'+
      (best?(' \u00b7 best so far: '+best.t+'\u00b0 \u2192 avg score '+best.avg.toFixed(0)+' over '+best.n+' nights'):' \u00b7 need ~3 nights per temperature to call a winner');
    if(window.CH3)CH3.destroy();
    window.CH3=new Chart(el('tempChart'),{type:'scatter',data:{datasets:[{label:'night',
      data:sl.map(x=>({x:x.temp,y:x.score,d:x.d})),backgroundColor:'rgba(175,82,222,.8)',pointRadius:5,pointHoverRadius:7}]},
      options:{animation:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>c.raw.d+': '+c.raw.y+' @ '+c.raw.x+'\u00b0'}}},
        scales:{x:{title:{display:true,text:'bedroom \u00b0C overnight',color:'#6e6e73',font:{size:11}},grid:{color:'rgba(0,0,0,.06)'}},
          y:{title:{display:true,text:'sleep score',color:'#6e6e73',font:{size:11}},min:40,max:100,grid:{color:'rgba(0,0,0,.06)'}}}}});
  }
  // recent nights table
  const nights=(o.nights||[]).slice().reverse();
  if(nights.length){
    el('nightsCard').hidden=false;
    el('nightsTable').innerHTML='<tr><th>night</th><th>slept</th><th>deep</th><th>REM</th><th>eff</th><th>low HR</th><th>HRV</th></tr>'+
      nights.map(x=>`<tr><td>${x.day}</td><td>${hm(x.dur)}</td><td>${hm(x.deep)}</td><td>${hm(x.rem)}</td><td>${x.eff??'–'}%</td><td>${x.lhr??'–'}</td><td>${x.hrv??'–'}</td></tr>`).join('');
  }
}
async function unlock(pass){
  try{
    const p=pass!==undefined?pass:el('pw').value;
    render(await loadHome(p));
    PASS=p; localStorage.setItem('pw_pass',p); el('overlay').style.display='none';
    setInterval(async()=>{try{render(await loadHome(PASS))}catch(e){}},5*60*1000);
  }catch(e){
    el('overlay').style.display='flex';
    el('pwerr').textContent=e.name==='OperationError'?'Wrong password':e.message;
  }
}
window.addEventListener('load',()=>{
  const saved=localStorage.getItem('pw_pass');
  if(saved) unlock(saved); else el('overlay').style.display='flex';
});
el('pw').addEventListener('keydown',e=>{if(e.key==='Enter')unlock()});
</script>
</body>
</html>
