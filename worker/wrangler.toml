name = "powerwall-poller"
main = "src/worker.js"
compatibility_date = "2025-01-01"
account_id = "f7ec34691d5a86b4b461890d69a53371"
workers_dev = false

[triggers]
crons = ["* * * * *"]

[observability]
enabled = true

[[r2_buckets]]
binding = "PW"
bucket_name = "powerwall-data"

[[durable_objects.bindings]]
name = "LIVE"
class_name = "LiveHub"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["LiveHub"]

[[routes]]
pattern = "powerwall-api.randlefamily.com"
custom_domain = true
