<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Heat pump</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Heat pump">
<meta name="theme-color" content="#f5f5f7">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<style>
  :root{--bg:#f5f5f7;--card:#fff;--edge:rgba(0,0,0,.05);--txt:#1d1d1f;--dim:#6e6e73;
    --mint:#34c759;--sun:#ff9500;--cyan:#007aff;--pink:#ff3b30}
  *{box-sizing:border-box;margin:0}
  html,body{overflow-x:hidden;max-width:100vw}
  body{color:var(--txt);font:15px/1.5 -apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',Roboto,sans-serif;
    padding:24px 20px;max-width:1150px;margin:auto;background:var(--bg);min-height:100vh;-webkit-font-smoothing:antialiased}
  nav{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
  nav a{text-decoration:none;color:var(--txt);background:#fff;border:1px solid #e5e5ea;border-radius:99px;padding:6px 16px;font-size:13px;font-weight:600}
  nav a.on{background:#1d1d1f;color:#fff;border-color:#1d1d1f}
  h1{font-size:22px;font-weight:700;margin-bottom:2px}
  .sub{color:var(--dim);font-size:13px;margin-bottom:16px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:14px;margin-bottom:18px}
  .card{background:var(--card);border:1px solid var(--edge);border-radius:18px;padding:16px 18px;box-shadow:0 1px 2px rgba(0,0,0,.03)}
  .card h3{font-size:13px;font-weight:600;color:var(--dim)}
  .card .v{font-size:30px;font-weight:700;letter-spacing:-.02em}
  .card .m{font-size:12px;color:var(--dim)}
  .ok{color:var(--mint)} .warn{color:var(--pink)}
  .err{color:var(--pink);font-size:13px;margin:10px 0}
  #overlay{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:10}
  #overlay .box{background:#fff;border:1px solid var(--edge);padding:32px;border-radius:22px;width:320px;text-align:center}
  input,button{font:inherit;border-radius:10px;border:1px solid #d2d2d7;padding:8px 12px}
  button{background:#0071e3;color:#fff;border:0;font-weight:600;cursor:pointer;border-radius:980px;padding:8px 16px}
</style>
</head>
<body>
<nav>
  <a href="./">⚡ Energy</a><a href="heating">🌡 Heating</a><a class="on" href="heatpump">♨️ Heat pump</a><a href="network">📶 Network</a><a href="octopus">🐙 Octopus</a><a href="oura">💍 Oura</a>
</nav>
<h1>Heat pump</h1>
<div class="sub" id="sub">…</div>
<div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center">
  <button onclick="cmd('vaillant_dhw_boost','on')">Boost hot water</button>
  <button style="background:#e8e8ed;color:var(--txt)" onclick="cmd('vaillant_dhw_boost','off')">Cancel boost</button>
  <input id="dhwT" type="number" min="35" max="65" step="1" value="50" style="width:66px">
  <button style="background:#e8e8ed;color:var(--txt)" onclick="cmd('vaillant_dhw_temp',val('dhwT'))">Set tank target</button>
</div>
<div class="err" id="err"></div>
<div class="grid" id="cards"></div>
<div class="card" style="margin-bottom:18px">
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
    <h3 style="font-size:13px;font-weight:600;color:var(--dim);flex:1">ENERGY USED</h3>
    <select id="eperiod" onchange="renderReport()">
      <option value="day">Days</option>
      <option value="week">Weeks</option>
      <option value="month">Months</option>
      <option value="year">Years</option>
    </select>
  </div>
  <div id="etotal" style="font-size:22px;font-weight:700;margin-bottom:6px">–</div>
  <canvas id="echart" height="120"></canvas>
</div>
<div class="grid" id="zones"></div>

<div id="overlay" style="display:none"><div class="box">
  <h1 style="font-size:18px;margin-bottom:12px">Unlock</h1>
  <input id="pw" type="password" placeholder="Password" style="width:100%;margin-bottom:10px">
  <button onclick="unlock()">Open</button>
  <div class="err" id="pwerr"></div>
</div></div>

<script>
const WORKER='https://powerwall-api.randlefamily.com';
const el=id=>document.getElementById(id);
let PASS=null;
async function deriveKey(pass,salt){
  const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pass),'PBKDF2',false,['deriveKey']);
  return crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:200000,hash:'SHA-256'},km,{name:'AES-CBC',length:256},false,['decrypt']);
}
async function loadHome(pass){
  const res=await fetch(`${WORKER}/home?_=${Date.now()}`,{cache:'no-store'});
  if(!res.ok) throw new Error('no data yet — the worker refreshes every 5 minutes');
  const raw=Uint8Array.from(atob((await res.text()).trim()),c=>c.charCodeAt(0));
  const key=await deriveKey(pass,raw.slice(0,16));
  const pt=await crypto.subtle.decrypt({name:'AES-CBC',iv:raw.slice(16,32)},key,raw.slice(32));
  return JSON.parse(new TextDecoder().decode(pt));
}
function card(h,v,m,cls){return `<div class="card"><h3>${h}</h3><div class="v ${cls||''}">${v}</div><div class="m">${m||''}</div></div>`}
let EDAILY=[],ECHART=null;
function renderReport(){
  const p=el('eperiod').value;
  const agg={};
  for(const r of EDAILY){
    let k;
    if(p==='day')k=r.d;
    else if(p==='week'){const dt=new Date(r.d+'T12:00:00Z');const off=(dt.getUTCDay()+6)%7;k=new Date(+dt-off*864e5).toISOString().slice(0,10)}
    else if(p==='month')k=r.d.slice(0,7);
    else k=r.d.slice(0,4);
    agg[k]=(agg[k]||0)+(r.kwh||0);
  }
  const keys=Object.keys(agg).sort();
  const show=p==='day'?keys.slice(-31):p==='week'?keys.slice(-26):p==='month'?keys.slice(-24):keys;
  const nowKey=show[show.length-1];
  el('etotal').textContent=nowKey?((Math.round(agg[nowKey]*10)/10)+' kWh this '+(p==='day'?'day':p)+' · '+(Math.round((agg[nowKey]*TARIFFISH)*10)/10>=100?'£'+(agg[nowKey]*TARIFFISH/100).toFixed(2):Math.round(agg[nowKey]*TARIFFISH)+'p')+' est.'):'no data yet';
  const labels=show.map(k=>p==='day'?k.slice(5):p==='week'?('w/c '+k.slice(5)):k);
  if(ECHART)ECHART.destroy();
  ECHART=new Chart(el('echart'),{type:'bar',data:{labels,datasets:[{label:'kWh',data:show.map(k=>Math.round(agg[k]*100)/100),backgroundColor:'rgba(255,149,0,.85)',borderRadius:4}]},
    options:{animation:false,plugins:{legend:{display:false}},scales:{y:{grid:{color:'rgba(0,0,0,.06)'},ticks:{maxTicksLimit:4}},x:{ticks:{maxTicksLimit:10,color:'#6e6e73'},grid:{display:false}}}}});
}
const TARIFFISH=9; // rough blended p/kWh for the estimate line
function render(d){
  const v=d.vaillant||{};
  el('err').textContent=v.error?('vaillant: '+v.error):'';
  el('sub').textContent=(v.outdoor!=null?`outdoor ${v.outdoor.toFixed(1)}° · `:'')+'updated '+(d.generated_at||'').slice(11,16);
  const cards=[];
  if(v.power!=null) cards.push(card('Drawing now',(v.power/1000).toFixed(2)+' kW',v.power>100?'running':'standby',v.power>100?'warn':'ok'));
  if(v.flowTemp!=null) cards.push(card('Flow temperature',v.flowTemp.toFixed(0)+'°',''));
  if(v.dhwTemp!=null) cards.push(card('Hot water tank',v.dhwTemp.toFixed(0)+'°',v.dhwTarget!=null?('target '+v.dhwTarget.toFixed(0)+'°'):''));
  if(v.pressure!=null) cards.push(card('Pressure',v.pressure.toFixed(1)+' bar',v.pressure>=1&&v.pressure<=2.5?'healthy':'check pressure',v.pressure>=1&&v.pressure<=2.5?'ok':'warn'));
  if(v.outdoor!=null) cards.push(card('Outdoor sensor',v.outdoor.toFixed(1)+'°',''));
  el('cards').innerHTML=cards.join('')||'<div class="sub">No heat pump data yet — add your myVAILLANT credentials (I’ll walk you through it).</div>';
  EDAILY=v.energyDaily||[];
  renderReport();
  el('zones').innerHTML=(v.zones||[]).map((z,i)=>`
    <div class="card">
      <h3>${z.name}</h3>
      <div class="v">${z.temp!=null?z.temp.toFixed(1):'–'}°</div>
      <div class="m">${z.target!=null?('target '+z.target.toFixed(1)+'°'):''}${z.humidity!=null?(' · '+z.humidity.toFixed(0)+'% rh'):''}</div>
      <div style="display:flex;gap:6px;margin-top:10px;align-items:center">
        <input id="v_${i}" type="number" step="0.5" min="5" max="30" value="${z.target!=null?z.target:20}" style="width:62px">
        <button style="padding:6px 12px;font-size:12px" onclick="cmd('vaillant_veto','${z.index}|'+val('v_${i}'))">Veto 4h</button>
        <button style="padding:6px 12px;font-size:12px;background:#e8e8ed;color:var(--txt)" onclick="cmd('vaillant_veto_cancel','${z.index}')">Cancel</button>
      </div>
    </div>`).join('');
}
const val=id=>document.getElementById(id).value;
async function cmd(c,v){
  el('err').style.color='var(--dim)';el('err').textContent='working…';
  try{
    const r=await fetch(`${WORKER}/cmd`,{method:'POST',headers:{'Content-Type':'application/json','x-auth':PASS},body:JSON.stringify({command:c,value:v??''})});
    const j=await r.json();
    el('err').style.color=j.ok?'var(--mint)':'var(--pink)';
    el('err').textContent=j.ok?((j.log||[]).join('; ')||'done'):(j.error||'failed');
    setTimeout(async()=>{try{render(await loadHome(PASS))}catch(e){}},5000);
  }catch(e){el('err').style.color='var(--pink)';el('err').textContent=String(e).slice(0,120)}
}
async function unlock(pass){
  try{
    const p=pass!==undefined?pass:el('pw').value;
    render(await loadHome(p));
    PASS=p; localStorage.setItem('pw_pass',p); el('overlay').style.display='none';
    setInterval(async()=>{try{render(await loadHome(PASS))}catch(e){}},60*1000);
  }catch(e){
    el('overlay').style.display='flex';
    el('pwerr').textContent=e.name==='OperationError'?'Wrong password':e.message;
  }
}
window.addEventListener('load',()=>{
  const saved=localStorage.getItem('pw_pass');
  if(saved) unlock(saved); else el('overlay').style.display='flex';
});
el('pw').addEventListener('keydown',e=>{if(e.key==='Enter')unlock()});
</script>
</body>
</html>
