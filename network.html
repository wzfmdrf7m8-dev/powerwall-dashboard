<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Network</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Network">
<meta name="theme-color" content="#f5f5f7">
<style>
  :root{--bg:#f5f5f7;--card:#fff;--edge:rgba(0,0,0,.05);--txt:#1d1d1f;--dim:#6e6e73;
    --mint:#34c759;--sun:#ff9500;--cyan:#007aff;--pink:#ff3b30}
  *{box-sizing:border-box;margin:0}
  html,body{overflow-x:hidden;max-width:100vw}
  body{color:var(--txt);font:15px/1.5 -apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',Roboto,sans-serif;
    padding:24px 20px;max-width:1150px;margin:auto;background:var(--bg);min-height:100vh;-webkit-font-smoothing:antialiased}
  nav{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
  nav a{text-decoration:none;color:var(--txt);background:#fff;border:1px solid #e5e5ea;border-radius:99px;padding:6px 16px;font-size:13px;font-weight:600}
  nav a.on{background:#1d1d1f;color:#fff;border-color:#1d1d1f}
  h1{font-size:22px;font-weight:700;margin-bottom:2px}
  .sub{color:var(--dim);font-size:13px;margin-bottom:16px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:14px;margin-bottom:18px}
  .card{background:var(--card);border:1px solid var(--edge);border-radius:18px;padding:16px 18px;box-shadow:0 1px 2px rgba(0,0,0,.03)}
  .card h3{font-size:13px;font-weight:600;color:var(--dim)}
  .card .v{font-size:28px;font-weight:700;letter-spacing:-.02em}
  .card .m{font-size:12px;color:var(--dim)}
  .ok{color:var(--mint)} .warn{color:var(--pink)}
  table{width:100%;border-collapse:collapse;font-size:13px;background:#fff;border:1px solid var(--edge);border-radius:14px;overflow:hidden}
  th,td{text-align:left;padding:8px 12px;border-bottom:1px solid #f0f0f3}
  th{color:var(--dim);font-weight:600;font-size:12px}
  .err{color:var(--pink);font-size:13px;margin:10px 0}
  #overlay{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:10}
  #overlay .box{background:#fff;border:1px solid var(--edge);padding:32px;border-radius:22px;width:320px;text-align:center}
  input,button{font:inherit;border-radius:10px;border:1px solid #d2d2d7;padding:8px 12px}
  button{background:#0071e3;color:#fff;border:0;font-weight:600;cursor:pointer;border-radius:980px;padding:8px 16px}
</style>
</head>
<body>
<nav>
  <a href="./">⚡ Energy</a><a href="heating">🌡 Heating</a><a href="heatpump">♨️ Heat pump</a><a class="on" href="network">📶 Network</a>
</nav>
<h1>Network</h1>
<div class="sub" id="sub">…</div>
<div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">
  <button onclick="cmd('eero_speedtest','')">Run speed test</button>
  <button style="background:#e8e8ed;color:var(--txt)" onclick="cmd('eero_guest','on')">Guest wifi on</button>
  <button style="background:#e8e8ed;color:var(--txt)" onclick="cmd('eero_guest','off')">Guest wifi off</button>
</div>
<div class="err" id="err"></div>
<div class="grid" id="cards"></div>
<div id="devices"></div>

<div id="overlay" style="display:none"><div class="box">
  <h1 style="font-size:18px;margin-bottom:12px">Unlock</h1>
  <input id="pw" type="password" placeholder="Password" style="width:100%;margin-bottom:10px">
  <button onclick="unlock()">Open</button>
  <div class="err" id="pwerr"></div>
</div></div>

<script>
const WORKER='https://powerwall-api.randlefamily.com';
const el=id=>document.getElementById(id);
let PASS=null;
async function deriveKey(pass,salt){
  const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pass),'PBKDF2',false,['deriveKey']);
  return crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:200000,hash:'SHA-256'},km,{name:'AES-CBC',length:256},false,['decrypt']);
}
async function loadHome(pass){
  const res=await fetch(`${WORKER}/home?_=${Date.now()}`,{cache:'no-store'});
  if(!res.ok) throw new Error('no data yet — the worker refreshes every 5 minutes');
  const raw=Uint8Array.from(atob((await res.text()).trim()),c=>c.charCodeAt(0));
  const key=await deriveKey(pass,raw.slice(0,16));
  const pt=await crypto.subtle.decrypt({name:'AES-CBC',iv:raw.slice(16,32)},key,raw.slice(32));
  return JSON.parse(new TextDecoder().decode(pt));
}
function card(h,v,m,cls){return `<div class="card"><h3>${h}</h3><div class="v ${cls||''}">${v}</div><div class="m">${m||''}</div></div>`}
function render(d){
  const n=d.eero||{};
  el('err').textContent=n.error?('eero: '+n.error):'';
  el('sub').textContent=(n.name?n.name+' · ':'')+'updated '+(d.generated_at||'').slice(11,16);
  const sp=n.speed||{};
  const down=sp.down&&sp.down.value?Math.round(sp.down.value):null;
  const up=sp.up&&sp.up.value?Math.round(sp.up.value):null;
  const cards=[
    card('Status',(n.status==='connected'?'Online':n.status||'–'),(n.nodes||[]).length+' eeros',(n.status==='connected'?'ok':'warn')),
    card('Speed test',down!=null?`${down} ↓ ${up} ↑`:'–',sp.date?('Mbps · '+sp.date.slice(0,16).replace('T',' ')):'Mbps'),
    card('Devices online',n.deviceCount!=null?n.deviceCount:'–',''),
    card('Guest network',n.guest?'On':'Off',''),
  ];
  el('cards').innerHTML=cards.join('');
  const nodes=(n.nodes||[]).map(x=>`<tr><td>${x.location||'–'}</td><td>${x.model||''}</td><td class="${x.status==='green'?'ok':'warn'}">${x.status||''}</td><td>${x.id?`<button style="padding:4px 10px;font-size:12px;background:#e8e8ed;color:var(--txt)" onclick="if(confirm('Reboot ${(x.location||'this eero').replace(/'/g,'')}?'))cmd('eero_reboot','${x.id}')">Reboot</button>`:''}</td></tr>`).join('');
  const devs=(n.devices||[]).map(x=>`<tr><td>${(x.name||'').slice(0,34)}</td><td>${x.ip||''}</td><td>${x.wireless?(x.band||'wifi'):'wired'}</td></tr>`).join('');
  el('devices').innerHTML=
    (nodes?`<table style="margin-bottom:14px"><tr><th>eero</th><th>model</th><th>status</th><th></th></tr>${nodes}</table>`:'')+
    (devs?`<table><tr><th>device</th><th>ip</th><th>connection</th></tr>${devs}</table>`:'');
}
const val=id=>document.getElementById(id).value;
async function cmd(c,v){
  el('err').style.color='var(--dim)';el('err').textContent='working…';
  try{
    const r=await fetch(`${WORKER}/cmd`,{method:'POST',headers:{'Content-Type':'application/json','x-auth':PASS},body:JSON.stringify({command:c,value:v??''})});
    const j=await r.json();
    el('err').style.color=j.ok?'var(--mint)':'var(--pink)';
    el('err').textContent=j.ok?((j.log||[]).join('; ')||'done'):(j.error||'failed');
    setTimeout(async()=>{try{render(await loadHome(PASS))}catch(e){}},5000);
  }catch(e){el('err').style.color='var(--pink)';el('err').textContent=String(e).slice(0,120)}
}
async function unlock(pass){
  try{
    const p=pass!==undefined?pass:el('pw').value;
    render(await loadHome(p));
    PASS=p; localStorage.setItem('pw_pass',p); el('overlay').style.display='none';
    setInterval(async()=>{try{render(await loadHome(PASS))}catch(e){}},60*1000);
  }catch(e){
    el('overlay').style.display='flex';
    el('pwerr').textContent=e.name==='OperationError'?'Wrong password':e.message;
  }
}
window.addEventListener('load',()=>{
  const saved=localStorage.getItem('pw_pass');
  if(saved) unlock(saved); else el('overlay').style.display='flex';
});
el('pw').addEventListener('keydown',e=>{if(e.key==='Enter')unlock()});
</script>
</body>
</html>
